name: Publish a release

on:
  push:
    tags:
      - '*' # Triggers on any tag creation

jobs:
  update:
    name: Publish new OperatorHub release
    runs-on: ubuntu-22.04
    steps:
      - name: Get the release tag
        run: "echo Release tag: ${GITHUB_REF##*/}"
        
      - name: Checkout tools repo
        uses: actions/checkout@v4
        with:
          repository: fmuyassarov/operator-demo
          path: operator-demo
          ref: main
          token: ${{ secrets.MACHINE_PAT }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import-gpg
        with:
          gpg_private_key: ${{ secrets.MACHINE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MACHINE_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          workdir: operator-demo

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          signoff: true
          committer: "Github Actions <${{ steps.import-gpg.outputs.email }}>"
          path: operator-demo
          push-to-fork: nri-plugins-bot/operator-demo
          branch: operator-$GITHUB_REF_NAME
          token: ${{ secrets.MACHINE_PAT }}
          delete-branch: false
          title: 'operator nri-plugins-operator $GITHUB_REF_NAME'
          commit-message: 'Submit operator nri-plugins-operator ${{ steps.update.outputs.VERSION }}'
          body: |
            Added nri-plugins OLM bundle for Auto-generated by `Github Actions Bot`
            Added OLM bundle for [nri-plugins operator $GITHUB_REF_NAME](https://github.com/containers/nri-plugins/releases/tag/v$GITHUB_REF_NAME)
            > Auto-generated by `Github Actions Bot`
name: Publish a release

on:
  push:
    tags:
      - '*' # Triggers on any tag creation

jobs:
  update:
    name: Publish new OperatorHub release
    runs-on: ubuntu-latest
    steps:
      # - name: pwd
      #   run: cd && pwd

      - name: Checkout tools repo
        uses: actions/checkout@v4
        with:
          repository: fmuyassarov/operator-demo
          path: __operator-demo
          ref: main
          token: ${{ secrets.MACHINE_PAT }}
          
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import-gpg
        with:
          gpg_private_key: ${{ secrets.MACHINE_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MACHINE_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          workdir: __operator-demo

      - name: Make changes
        run: date +%s >__operator-demo/report.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'operator:'
          signoff: true
          committer: "Github Actions <${{ steps.import-gpg.outputs.email }}>"
          path: __operator-demo
          push-to-fork: nri-plugins-bot/operator-demo
          branch: vm-operator
          token: ${{ secrets.MACHINE_PAT }}
          delete-branch: true
          title: 'operator'
          body: |
            Added OLM package for Auto-generated by `Github Actions Bot`